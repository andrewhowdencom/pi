version: 1
default_action: block
# Rules are evaluated top-to-bottom; the first matching rule wins.
# The catch-all "Block outside project" MUST be the last rule, otherwise
# any rule placed after it will be dead code (never reached).

rules:
  # Broad harmless allows first — these tools have no path and are safe.
  - name: "Allow harmless task management"
    condition: 'tool.startsWith("Task") && tool != "TaskExecute"'
    action: allow

  # Specific allows outside the project directory.
  - name: "Allow reads of the Agent dir"
    condition: 'tool == "read" && path.matches("^/home/[^/]+/\\.agents/.*")'
    action: allow

  # Allow reads of pi libraries (@mariozechner packages in node_modules).
  - name: "Allow reads of pi libraries"
    condition: 'tool == "read" && path.matches(".*@mariozechner.*")'
    action: allow

  # General allow for file-based tools within the project directory.
  - name: "Allow within project"
    condition: 'path.startsWith(cwd)'
    action: allow

  - name: "Allow switching agents"
    condition: 'tool == "switch_agent"'
    action: allow 

  - name: "Allow invokinbg sub-agents"
    condition: 'tool.startsWith("invoke_")'
    action: allow

  # Bash-specific rules. Nested rules are checked in order when tool == "bash".
  - name: "Bash"
    condition: 'tool == "bash"'
    rules:
      - name: "Block command chaining"
        condition: 'command.matches(".*((&&)|(\\|)).*")'
        action: block
        message: "Command chaining with &&, ||, or | is not allowed. Use separate commands instead."

      - name: "Block cat"
        condition: 'command.matches("^cat\\b")'
        action: block
        message: "please use read tool"

      - name: "Confirm git force push"
        condition: 'command.matches("^git\\s+push\\b") && (command.matches(".*--force.*") || command.matches(".*--force-with-lease.*") || command.matches(".*\\s-f(\\s|$).*"))'
        action: confirm
        message: "Force push can rewrite remote history. Confirm?"

      - name: "Block git -C"
        condition: 'command.matches("^git\\s+-C")'
        action: block
        message: "git -C bypasses the project directory sandbox. Use cd and relative paths instead."

      - name: "Allow safe git"
        condition: 'command.matches("^git\\s+(add|log|status|diff|commit|branch|show|stash|remote|tag|push|pull|fetch)\\b")'
        action: allow

      - name: "Allow safe commands"
        condition: 'command.matches("^(ls|find|grep|pwd|mkdir|wc|id|whoami|uname|env|echo|which)\\b")'
        action: allow

      - name: "Allow task"
        condition: 'command.matches("^task\\b")'
        action: allow

      - name: "Allow safe Bun and TypeScript commands"
        condition: 'command.matches("^(bun\\s+(install|i|add|remove|rm|test|x|upgrade|pm\\s+ls|run\\s+(test|lint|typecheck|check|dev))\\b|bunx\\b|tsc\\s+--noEmit\\b)")'
        action: allow

      - name: "Allow safe mcp-cli discovery"
        condition: 'command.matches("^mcp-cli(\\s+(-d|--help|-c\\s+\\S+))*\\s*$") || command.matches("^mcp-cli(\\s+(-d|--help|-c\\s+\\S+))*\\s+(info|grep)\\b")'
        action: allow

      - name: "Confirm mcp-cli call"
        condition: 'command.matches("^mcp-cli(\\s+(-d|--help|-c\\s+\\S+))*\\s+call\\b")'
        action: confirm
        message: "mcp-cli call executes tools on external MCP servers. Confirm?"

      - name: "Allow safe gh commands"
        condition: 'command.matches("^gh\\s+(status|repo\\s+view|pr\\s+(list|view|diff|checks)|issue\\s+(list|view)|run\\s+(list|view|watch)|workflow\\s+(list|view)|release\\s+(list|view)|search|gist\\s+(list|view)|auth\\s+status)\\b")'
        action: allow

      - name: "Allow safe gh create"
        condition: 'command.matches("^gh\\s+(pr|issue|release|gist)\\s+create\\b")'
        action: allow

      - name: "Block destructive gh commands"
        condition: 'command.matches("^gh\\s+(repo\\s+delete|release\\s+delete|gist\\s+delete|run\\s+cancel|auth\\s+(login|logout|refresh))\\b")'
        action: block
        message: "This gh command is destructive or changes auth state and is blocked"

      - name: "Confirm other gh commands"
        condition: 'command.matches("^gh\\b")'
        action: confirm
        message: "This GitHub CLI command may modify remote state. Confirm?"

      - name: "Block destructive commands"
        condition: 'command.matches(".*\\bsudo\\b.*")'
        action: block
        message: "In general, you should not need root or to switch users to achieve tasks"

      - name: "Confirm other bash"
        condition: 'true'
        action: confirm
        message: "Shell commands require manual approval"

  # Confirm reads outside the project that aren't already explicitly allowed above.
  - name: "Confirm reads outside project"
    condition: 'tool == "read" && !path.startsWith(cwd)'
    action: confirm
    message: "This file is outside the project directory. Confirm?"

  # Catch-all: anything that hasn't matched an allow rule above is blocked.
  # This must remain the LAST rule.
  - name: "Block outside project"
    condition: 'true'
    action: block
    message: "Operations outside the project directory are blocked"
