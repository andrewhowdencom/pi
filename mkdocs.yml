site_name: Pi Documentation
site_url: https://andrewhowdencom.github.io/pi/
repo_url: https://github.com/andrewhowdencom/pi
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Agents: '!import https://github.com/andrewhowdencom/pi.agents?branch=main'
  - HITL: '!import https://github.com/andrewhowdencom/pi.hitl?branch=main'
  - LiteLLM: '!import https://github.com/andrewhowdencom/pi.litellm?branch=main'
  - OpenAI: '!import https://github.com/andrewhowdencom/pi.openai?branch=main'
  - Web: '!import https://github.com/andrewhowdencom/pi.web?branch=main'

plugins:
  - search
  - multirepo:
      cleanup: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/andrewhowdencom/pi
  generator: false

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
