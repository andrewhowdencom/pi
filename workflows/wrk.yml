---
name: wrk
description: "Plan the architecture, then implement it"

steps:
  - id: "plan"
    agent: "plan"
    type: linear
    prompt: |
      Consider the oldest _open_ GitHub issue within this repository. Review that issue, and determine if:

        1. It has already been implemented
        2. It requires implementation

      If it has already been implemented, please close it immediately with a note that describes how you determined it was implemented, complete with links and references.

      If it has not already been implemented, create a plan on how this GitHub issue could be addressed.

  - id: "plan:review"
    type: pause
    prompt: "The workflow is paused. Provide your direction to continue."

  - id: execution
    agent: execution
    type: linear
    prompt: |
      Execute the development plan end-to-end:
      1. Create a feature branch from main (see git skill for naming conventions)
      2. Implement the plan
      3. Invoke quality subagents for verification
      4. Commit with a proper message
      5. Push and clean up
    subagents:
      - testing
      - review:docs:user
      - review:docs:dev
    
